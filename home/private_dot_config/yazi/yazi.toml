[mgr]
ratio          = [ 1, 3, 4 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
sort_fallback  = "alphabetical"
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]

[preview]
wrap           = "no"
tab_size       = 2
max_width      = 600
max_height     = 900
image_filter   = "lanczos3"
image_quality  = 75
image_delay    = 0

[opener]
edit = [
	{ run = '$EDITOR %s', block = true, desc = "Edit" },
]
open = [
	{ run = 'open %s', desc = "Open" },
]
play = [
	{ run = 'open -a "QuickTime Player" %s', orphan = true, desc = "Play" },
]

[open]
prepend_rules = [
	{ mime = "text/*", use = [ "edit", "open" ] },
	{ mime = "image/*", use = [ "open" ] },
	{ mime = "video/*", use = [ "play" ] },
	{ mime = "audio/*", use = [ "play" ] },
	{ mime = "application/pdf", use = [ "open" ] },
	{ name = "*/", use = [ "edit", "open" ] },
]

[tasks]
file_workers    = 5
plugin_workers  = 5
fetch_workers   = 5
preload_workers = 2
process_workers = 5
bizarre_retry   = 5
suppress_preload = false

[plugin]
prepend_previewers = [
	{ mime = "image/heic", run = "heic" },
]
